services:
  redis-db:
    extends:
      file: ./services/redis.yml
      service: redis-db

  db-init:
    extends:
      file: ./services/db.yml
      service: db-init

  db:
    depends_on:
      db-init:
        condition: service_completed_successfully
    extends:
      file: ./services/db.yml
      service: db

  backend:
    depends_on:
      - db
      - redis-db
    # Use stock Blockscout backend for now. Custom temporal endpoints
    # require building from source (docker/Dockerfile in repo root).
    # To build custom: change to build: context: .. dockerfile: docker/Dockerfile
    image: ghcr.io/blockscout/blockscout:latest
    pull_policy: always
    restart: always
    stop_grace_period: 5m
    container_name: 'backend'
    command: sh -c "bin/blockscout eval \"Elixir.Explorer.ReleaseTasks.create_and_migrate()\" && bin/blockscout start"
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    env_file:
      - ./envs/common-blockscout-roko.env
    volumes:
      - ./logs/:/app/logs/
      - ./dets/:/app/dets/
    links:
      - db:database
    environment:
      ETHEREUM_JSONRPC_VARIANT: 'geth'

  frontend:
    depends_on:
      - backend
    image: roko-blockscout-frontend:local
    restart: always
    container_name: 'frontend'
    env_file:
      - ./envs/common-frontend-roko.env

  proxy:
    depends_on:
      - backend
      - frontend
    image: nginx
    container_name: proxy
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - "./proxy-roko:/etc/nginx/templates"
    environment:
      BACK_PROXY_PASS: http://backend:4000
      FRONT_PROXY_PASS: http://frontend:3000
    ports:
      - "14000:80"
      - "14001:8080"
